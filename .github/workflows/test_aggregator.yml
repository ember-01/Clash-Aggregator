name: Test New Sources
on:
  workflow_dispatch: # This allows you to run it manually from the "Actions" tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install pyyaml requests pytz
        
      - name: Run Aggregator with Test Sources
        run: python3 aggregator.py sources_test.txt clash_test
        
      - name: Commit Test Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add clash_test.yaml clash_test_lite.yaml
          git commit -m "Update Test Results" || exit 0
          git push

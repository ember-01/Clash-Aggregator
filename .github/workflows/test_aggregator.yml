name: Test New Sources
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install pyyaml requests pytz
        
      - name: Run Aggregator with Test Sources
        run: python3 aggregator.py sources_test.txt clash_test
        
      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git add clash_test.yaml clash_test_lite.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "🧪 Update Test Results"

          # Sync before pushing to avoid conflicts
          git pull --rebase origin main || true
          git push origin main

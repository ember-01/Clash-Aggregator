name: Aggregate Clash Subscriptions

on:
  schedule:
    - cron: '30 * * * *'   # 30 mins past of every hour
  workflow_dispatch:
#  push:
#    paths:
#      - 'sources.txt'
#      - 'aggregator.py'

permissions:
  contents: write

concurrency:
  group: clash-aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with remote main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml requests pytz geoip2

      - name: Run aggregator
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: python aggregator.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git add *.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "🔄 Update proxies"

          git pull --rebase origin main || true
          git push origin main
